<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cadastro de Moradores</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Ficha de Moradores</h2>

<form action="https://script.google.com/macros/s/AKfycbypDWV-viQPJlSXBz1J65JcR872Z_EKrSJrgFPCsAdZCwou1kSmlXlRX3JrlG-EiGLz/exec" method="POST">

<label>Apartamento</label>
<input type="text" name="apto" required>

<label>Nome do Morador</label>
<input type="text" name="nome" required>

<label>Telefone</label>
<input type="tel" name="telefone">

<label>Email</label>
<input type="email" name="email">

<label>Contato de Emergência</label>
<input type="text" name="emergencia">

<label>Telefone de Emergência</label>
<input type="tel" name="telEmergencia">

<button type="submit">Enviar</button>

</form>
